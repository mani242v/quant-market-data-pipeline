name: Quant Market Data Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas yfinance snowflake-connector-python
          pip install "snowflake-connector-python[pandas]"

      - name: Run pipeline
        run: |
          cd python
          python run_pipeline.py
